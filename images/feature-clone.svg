<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- 左侧人形轮廓 - 原始 -->
  <g opacity="0.9">
    <!-- 头部 -->
    <circle cx="140" cy="130" r="35" fill="none" stroke="#1B4B6F" stroke-width="2"/>
    <!-- 身体 -->
    <path d="M140 170 L140 240" fill="none" stroke="#1B4B6F" stroke-width="2"/>
    <!-- 手臂 -->
    <path d="M140 185 L110 220" fill="none" stroke="#1B4B6F" stroke-width="1.5"/>
    <path d="M140 185 L170 220" fill="none" stroke="#1B4B6F" stroke-width="1.5"/>
    <!-- 腿部 -->
    <path d="M140 240 L120 300" fill="none" stroke="#1B4B6F" stroke-width="1.5"/>
    <path d="M140 240 L160 300" fill="none" stroke="#1B4B6F" stroke-width="1.5"/>
  </g>
  
  <!-- 右侧人形轮廓 - 克隆 -->
  <g opacity="0.9">
    <!-- 头部 -->
    <circle cx="260" cy="130" r="35" fill="none" stroke="#1B4B6F" stroke-width="2"/>
    <!-- 身体 -->
    <path d="M260 170 L260 240" fill="none" stroke="#1B4B6F" stroke-width="2"/>
    <!-- 手臂 -->
    <path d="M260 185 L230 220" fill="none" stroke="#1B4B6F" stroke-width="1.5"/>
    <path d="M260 185 L290 220" fill="none" stroke="#1B4B6F" stroke-width="1.5"/>
    <!-- 腿部 -->
    <path d="M260 240 L240 300" fill="none" stroke="#1B4B6F" stroke-width="1.5"/>
    <path d="M260 240 L280 300" fill="none" stroke="#1B4B6F" stroke-width="1.5"/>
  </g>
  
  <!-- 连接线 - 表示克隆关系 -->
  <path d="M180 130 Q200 110 220 130" fill="none" stroke="#1B4B6F" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.6"/>
  <path d="M180 200 Q200 180 220 200" fill="none" stroke="#1B4B6F" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.6"/>
  <path d="M180 270 Q200 250 220 270" fill="none" stroke="#1B4B6F" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.6"/>
  
  <!-- 克隆指示箭头 -->
  <path d="M200 80 L200 60 L190 70 M200 60 L210 70" fill="none" stroke="#1B4B6F" stroke-width="2"/>
  <text x="200" y="50" text-anchor="middle" fill="#1B4B6F" font-size="14" font-family="sans-serif">CLONE</text>
  
  <!-- 几何装饰 -->
  <circle cx="100" cy="100" r="4" fill="none" stroke="#1B4B6F" stroke-width="1.5" opacity="0.4"/>
  <circle cx="300" cy="100" r="4" fill="none" stroke="#1B4B6F" stroke-width="1.5" opacity="0.4"/>
  <circle cx="100" cy="320" r="4" fill="none" stroke="#1B4B6F" stroke-width="1.5" opacity="0.4"/>
  <circle cx="300" cy="320" r="4" fill="none" stroke="#1B4B6F" stroke-width="1.5" opacity="0.4"/>
  
  <!-- 同步指示器 -->
  <circle cx="200" cy="200" r="8" fill="none" stroke="#1B4B6F" stroke-width="1.5"/>
  <circle cx="200" cy="200" r="3" fill="#1B4B6F"/>
</svg>