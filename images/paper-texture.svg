<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Paper grain filter effect using pattern -->
    <pattern id="grain" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <rect width="100" height="100" fill="#FAF9F6"/>
      <!-- Random dots for texture -->
      <circle cx="10" cy="15" r="0.5" fill="#D4D4CF" opacity="0.3"/>
      <circle cx="35" cy="40" r="0.5" fill="#D4D4CF" opacity="0.2"/>
      <circle cx="60" cy="25" r="0.5" fill="#D4D4CF" opacity="0.25"/>
      <circle cx="85" cy="70" r="0.5" fill="#D4D4CF" opacity="0.3"/>
      <circle cx="25" cy="80" r="0.5" fill="#D4D4CF" opacity="0.2"/>
      <circle cx="75" cy="55" r="0.5" fill="#D4D4CF" opacity="0.25"/>
      <circle cx="50" cy="90" r="0.5" fill="#D4D4CF" opacity="0.2"/>
      <circle cx="90" cy="10" r="0.5" fill="#D4D4CF" opacity="0.3"/>
      <circle cx="5" cy="60" r="0.5" fill="#D4D4CF" opacity="0.25"/>
      <circle cx="45" cy="5" r="0.5" fill="#D4D4CF" opacity="0.2"/>
      <!-- More scattered dots -->
      <circle cx="20" cy="30" r="0.3" fill="#D4D4CF" opacity="0.15"/>
      <circle cx="55" cy="65" r="0.3" fill="#D4D4CF" opacity="0.2"/>
      <circle cx="80" cy="35" r="0.3" fill="#D4D4CF" opacity="0.15"/>
      <circle cx="30" cy="95" r="0.3" fill="#D4D4CF" opacity="0.2"/>
      <circle cx="70" cy="15" r="0.3" fill="#D4D4CF" opacity="0.15"/>
      <circle cx="15" cy="75" r="0.3" fill="#D4D4CF" opacity="0.2"/>
      <circle cx="95" cy="50" r="0.3" fill="#D4D4CF" opacity="0.15"/>
      <circle cx="40" cy="50" r="0.3" fill="#D4D4CF" opacity="0.2"/>
    </pattern>
    
    <!-- Subtle crease lines -->
    <linearGradient id="crease1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8E8E5;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#E8E8E5;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#E8E8E5;stop-opacity:0" />
    </linearGradient>
  </defs>
  
  <!-- Base paper color -->
  <rect width="400" height="400" fill="#FAF9F6"/>
  
  <!-- Grain texture -->
  <rect width="400" height="400" fill="url(#grain)"/>
  
  <!-- Subtle crease lines -->
  <path d="M0,100 Q200,120 400,90" fill="none" stroke="url(#crease1)" stroke-width="2"/>
  <path d="M0,300 Q200,280 400,310" fill="none" stroke="url(#crease1)" stroke-width="2"/>
  <path d="M100,0 Q120,200 90,400" fill="none" stroke="url(#crease1)" stroke-width="1.5"/>
  <path d="M300,0 Q280,200 310,400" fill="none" stroke="url(#crease1)" stroke-width="1.5"/>
  
  <!-- Very subtle edge aging -->
  <rect x="0" y="0" width="400" height="400" fill="none" stroke="#E8E8E5" stroke-width="1" opacity="0.2"/>
</svg>