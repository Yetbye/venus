<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- 青海波纹样 - 传统日本青海波（鱼鳞纹） -->
  <defs>
    <linearGradient id="seigaihaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2E6B8A"/>
      <stop offset="50%" style="stop-color:#1B4B6F"/>
      <stop offset="100%" style="stop-color:#0F3A5C"/>
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect x="0" y="0" width="200" height="200" fill="#E8F4F8" opacity="0.1"/>
  
  <!-- 第一行波浪 -->
  <g opacity="0.9">
    <path d="M0 25 Q25 0 50 25 Q75 50 100 25 Q125 0 150 25 Q175 50 200 25" 
          stroke="url(#seigaihaGrad)" stroke-width="2" fill="none"/>
    <path d="M0 25 Q25 50 50 25 Q75 0 100 25 Q125 50 150 25 Q175 0 200 25" 
          stroke="url(#seigaihaGrad)" stroke-width="2" fill="none"/>
  </g>
  
  <!-- 第二行波浪 -->
  <g opacity="0.75">
    <path d="M-25 50 Q0 25 25 50 Q50 75 75 50 Q100 25 125 50 Q150 75 175 50 Q200 25 225 50" 
          stroke="url(#seigaihaGrad)" stroke-width="2" fill="none"/>
    <path d="M-25 50 Q0 75 25 50 Q50 25 75 50 Q100 75 125 50 Q150 25 175 50 Q200 75 225 50" 
          stroke="url(#seigaihaGrad)" stroke-width="2" fill="none"/>
  </g>
  
  <!-- 第三行波浪 -->
  <g opacity="0.9">
    <path d="M0 75 Q25 50 50 75 Q75 100 100 75 Q125 50 150 75 Q175 100 200 75" 
          stroke="url(#seigaihaGrad)" stroke-width="2" fill="none"/>
    <path d="M0 75 Q25 100 50 75 Q75 50 100 75 Q125 100 150 75 Q175 50 200 75" 
          stroke="url(#seigaihaGrad)" stroke-width="2" fill="none"/>
  </g>
  
  <!-- 第四行波浪 -->
  <g opacity="0.75">
    <path d="M-25 100 Q0 75 25 100 Q50 125 75 100 Q100 75 125 100 Q150 125 175 100 Q200 75 225 100" 
          stroke="url(#seigaihaGrad)" stroke-width="2" fill="none"/>
    <path d="M-25 100 Q0 125 25 100 Q50 75 75 100 Q100 125 125 100 Q150 75 175 100 Q200 125 225 100" 
          stroke="url(#seigaihaGrad)" stroke-width="2" fill="none"/>
  </g>
  
  <!-- 第五行波浪 -->
  <g opacity="0.9">
    <path d="M0 125 Q25 100 50 125 Q75 150 100 125 Q125 100 150 125 Q175 150 200 125" 
          stroke="url(#seigaihaGrad)" stroke-width="2" fill="none"/>
    <path d="M0 125 Q25 150 50 125 Q75 100 100 125 Q125 150 150 125 Q175 100 200 125" 
          stroke="url(#seigaihaGrad)" stroke-width="2" fill="none"/>
  </g>
  
  <!-- 第六行波浪 -->
  <g opacity="0.75">
    <path d="M-25 150 Q0 125 25 150 Q50 175 75 150 Q100 125 125 150 Q150 175 175 150 Q200 125 225 150" 
          stroke="url(#seigaihaGrad)" stroke-width="2" fill="none"/>
    <path d="M-25 150 Q0 175 25 150 Q50 125 75 150 Q100 175 125 150 Q150 125 175 150 Q200 175 225 150" 
          stroke="url(#seigaihaGrad)" stroke-width="2" fill="none"/>
  </g>
  
  <!-- 第七行波浪 -->
  <g opacity="0.9">
    <path d="M0 175 Q25 150 50 175 Q75 200 100 175 Q125 150 150 175 Q175 200 200 175" 
          stroke="url(#seigaihaGrad)" stroke-width="2" fill="none"/>
    <path d="M0 175 Q25 200 50 175 Q75 150 100 175 Q125 200 150 175 Q175 150 200 175" 
          stroke="url(#seigaihaGrad)" stroke-width="2" fill="none"/>
  </g>
  
  <!-- 填充的扇形图案 -->
  <g fill="#1B4B6F" opacity="0.2">
    <path d="M25 25 Q50 0 75 25 Q50 50 25 25"/>
    <path d="M75 25 Q100 0 125 25 Q100 50 75 25"/>
    <path d="M125 25 Q150 0 175 25 Q150 50 125 25"/>
    
    <path d="M0 75 Q25 50 50 75 Q25 100 0 75"/>
    <path d="M50 75 Q75 50 100 75 Q75 100 50 75"/>
    <path d="M100 75 Q125 50 150 75 Q125 100 100 75"/>
    <path d="M150 75 Q175 50 200 75 Q175 100 150 75"/>
    
    <path d="M25 125 Q50 100 75 125 Q50 150 25 125"/>
    <path d="M75 125 Q100 100 125 125 Q100 150 75 125"/>
    <path d="M125 125 Q150 100 175 125 Q150 150 125 125"/>
    
    <path d="M0 175 Q25 150 50 175 Q25 200 0 175"/>
    <path d="M50 175 Q75 150 100 175 Q75 200 50 175"/>
    <path d="M100 175 Q125 150 150 175 Q125 200 100 175"/>
    <path d="M150 175 Q175 150 200 175 Q175 200 150 175"/>
  </g>
  
  <!-- 中心装饰圆 -->
  <circle cx="100" cy="100" r="30" stroke="#1B4B6F" stroke-width="1" fill="none" opacity="0.3"/>
  <circle cx="100" cy="100" r="20" stroke="#2E6B8A" stroke-width="0.8" fill="none" opacity="0.25"/>
  <circle cx="100" cy="100" r="10" fill="#1B4B6F" opacity="0.15"/>
</svg>