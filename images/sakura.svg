<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <linearGradient id="petalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB7C5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFC4D0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFD1DA;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="petalGradLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE4E9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFB7C5;stop-opacity:0.8" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="600" fill="#FAF9F6"/>
  
  <!-- Large sakura flower -->
  <g transform="translate(150, 150)">
    <!-- Petal 1 -->
    <path d="M0,0 Q-15,-30 0,-50 Q15,-30 0,0" fill="url(#petalGrad)" transform="rotate(0)"/>
    <!-- Petal 2 -->
    <path d="M0,0 Q-15,-30 0,-50 Q15,-30 0,0" fill="url(#petalGrad)" transform="rotate(72)"/>
    <!-- Petal 3 -->
    <path d="M0,0 Q-15,-30 0,-50 Q15,-30 0,0" fill="url(#petalGrad)" transform="rotate(144)"/>
    <!-- Petal 4 -->
    <path d="M0,0 Q-15,-30 0,-50 Q15,-30 0,0" fill="url(#petalGrad)" transform="rotate(216)"/>
    <!-- Petal 5 -->
    <path d="M0,0 Q-15,-30 0,-50 Q15,-30 0,0" fill="url(#petalGrad)" transform="rotate(288)"/>
    <!-- Center -->
    <circle cx="0" cy="0" r="8" fill="#F4D03F"/>
  </g>
  
  <!-- Medium sakura flower -->
  <g transform="translate(400, 200) rotate(30)">
    <path d="M0,0 Q-12,-24 0,-40 Q12,-24 0,0" fill="url(#petalGradLight)" transform="rotate(0)"/>
    <path d="M0,0 Q-12,-24 0,-40 Q12,-24 0,0" fill="url(#petalGradLight)" transform="rotate(72)"/>
    <path d="M0,0 Q-12,-24 0,-40 Q12,-24 0,0" fill="url(#petalGradLight)" transform="rotate(144)"/>
    <path d="M0,0 Q-12,-24 0,-40 Q12,-24 0,0" fill="url(#petalGradLight)" transform="rotate(216)"/>
    <path d="M0,0 Q-12,-24 0,-40 Q12,-24 0,0" fill="url(#petalGradLight)" transform="rotate(288)"/>
    <circle cx="0" cy="0" r="6" fill="#F4D03F"/>
  </g>
  
  <!-- Small sakura flower -->
  <g transform="translate(250, 350) rotate(-15)">
    <path d="M0,0 Q-8,-16 0,-28 Q8,-16 0,0" fill="url(#petalGrad)" transform="rotate(0)"/>
    <path d="M0,0 Q-8,-16 0,-28 Q8,-16 0,0" fill="url(#petalGrad)" transform="rotate(72)"/>
    <path d="M0,0 Q-8,-16 0,-28 Q8,-16 0,0" fill="url(#petalGrad)" transform="rotate(144)"/>
    <path d="M0,0 Q-8,-16 0,-28 Q8,-16 0,0" fill="url(#petalGrad)" transform="rotate(216)"/>
    <path d="M0,0 Q-8,-16 0,-28 Q8,-16 0,0" fill="url(#petalGrad)" transform="rotate(288)"/>
    <circle cx="0" cy="0" r="4" fill="#F4D03F"/>
  </g>
  
  <!-- Falling petals -->
  <g transform="translate(100, 400) rotate(45)">
    <ellipse cx="0" cy="0" rx="12" ry="6" fill="#FFB7C5" opacity="0.8"/>
  </g>
  <g transform="translate(480, 320) rotate(120)">
    <ellipse cx="0" cy="0" rx="10" ry="5" fill="#FFC4D0" opacity="0.7"/>
  </g>
  <g transform="translate(350, 480) rotate(-30)">
    <ellipse cx="0" cy="0" rx="8" ry="4" fill="#FFD1DA" opacity="0.6"/>
  </g>
  <g transform="translate(180, 280) rotate(90)">
    <ellipse cx="0" cy="0" rx="9" ry="4.5" fill="#FFB7C5" opacity="0.75"/>
  </g>
  <g transform="translate(450, 450) rotate(60)">
    <ellipse cx="0" cy="0" rx="11" ry="5.5" fill="#FFE4E9" opacity="0.65"/>
  </g>
  <g transform="translate(80, 100) rotate(-45)">
    <ellipse cx="0" cy="0" rx="7" ry="3.5" fill="#FFC4D0" opacity="0.7"/>
  </g>
  <g transform="translate(520, 80) rotate(15)">
    <ellipse cx="0" cy="0" rx="10" ry="5" fill="#FFB7C5" opacity="0.8"/>
  </g>
  
  <!-- Tiny scattered petals -->
  <ellipse cx="300" cy="100" rx="5" ry="2.5" fill="#FFD1DA" opacity="0.5" transform="rotate(30, 300, 100)"/>
  <ellipse cx="500" cy="150" rx="4" ry="2" fill="#FFE4E9" opacity="0.4" transform="rotate(-20, 500, 150)"/>
  <ellipse cx="120" cy="220" rx="6" ry="3" fill="#FFB7C5" opacity="0.6" transform="rotate(75, 120, 220)"/>
  <ellipse cx="550" cy="380" rx="5" ry="2.5" fill="#FFC4D0" opacity="0.5" transform="rotate(45, 550, 380)"/>
  <ellipse cx="200" cy="500" rx="4" ry="2" fill="#FFE4E9" opacity="0.45" transform="rotate(-60, 200, 500)"/>
  <ellipse cx="420" cy="120" rx="5" ry="2.5" fill="#FFD1DA" opacity="0.55" transform="rotate(10, 420, 120)"/>
</svg>