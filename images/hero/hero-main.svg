<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" width="800" height="1000">
  <defs>
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1"/>
      <stop offset="35%" style="stop-color:#1a3a5c;stop-opacity:1"/>
      <stop offset="65%" style="stop-color:#4a1942;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#9b2d6f;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="skinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8d5c4;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#d4b5a0;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#c49a82;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="hairGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a3e;stop-opacity:1"/>
      <stop offset="40%" style="stop-color:#2d1b4e;stop-opacity:1"/>
      <stop offset="70%" style="stop-color:#4a1942;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#6b1a55;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="dressGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a5c;stop-opacity:0.9"/>
      <stop offset="50%" style="stop-color:#2d1b69;stop-opacity:0.85"/>
      <stop offset="100%" style="stop-color:#4a1050;stop-opacity:0.8"/>
    </linearGradient>
    <radialGradient id="glowCenter" cx="50%" cy="45%" r="40%">
      <stop offset="0%" style="stop-color:#7b68ee;stop-opacity:0.4"/>
      <stop offset="60%" style="stop-color:#4a1942;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#0a1628;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.8"/>
      <stop offset="50%" style="stop-color:#7b68ee;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#4a1942;stop-opacity:0"/>
    </radialGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="strongGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="25" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="800" height="1000" fill="url(#mainGrad)"/>
  <rect width="800" height="1000" fill="url(#glowCenter)"/>
  <g filter="url(#softGlow)" opacity="0.15">
    <circle cx="200" cy="300" r="120" fill="#00d4ff"/>
    <circle cx="600" cy="250" r="80" fill="#ff00aa"/>
    <circle cx="150" cy="700" r="90" fill="#7b68ee"/>
    <circle cx="650" cy="750" r="110" fill="#00d4ff"/>
  </g>
  <g filter="url(#strongGlow)">
    <ellipse cx="400" cy="180" rx="130" ry="160" fill="url(#hairGrad)"/>
    <path d="M270 220 Q265 280 275 340 Q260 320 250 290 Q240 260 255 230 Z" fill="url(#hairGrad)"/>
    <path d="M530 220 Q535 280 525 340 Q540 320 550 290 Q560 260 545 230 Z" fill="url(#hairGrad)"/>
  </g>
  <g filter="url(#softGlow)">
    <ellipse cx="400" cy="310" rx="95" ry="115" fill="url(#skinGrad)"/>
    <ellipse cx="360" cy="285" rx="22" ry="14" fill="#fff" opacity="0.85"/>
    <ellipse cx="440" cy="285" rx="22" ry="14" fill="#fff" opacity="0.85"/>
    <circle cx="362" cy="288" r="10" fill="url(#eyeGlow)"/>
    <circle cx="442" cy="288" r="10" fill="url(#eyeGlow)"/>
    <circle cx="364" cy="288" r="5" fill="#0a1628"/>
    <circle cx="444" cy="288" r="5" fill="#0a1628"/>
    <circle cx="366" cy="286" r="2" fill="#fff" opacity="0.9"/>
    <circle cx="444" cy="286" r="2" fill="#fff" opacity="0.9"/>
    <path d="M385 330 Q400 342 415 330" stroke="#b08978" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <ellipse cx="350" cy="315" rx="14" ry="8" fill="#e8b4a0" opacity="0.5"/>
    <ellipse cx="450" cy="315" rx="14" ry="8" fill="#e8b4a0" opacity="0.5"/>
    <path d="M395 305 L405 305 L400 312 Z" fill="#d4897a" opacity="0.7"/>
  </g>
  <g filter="url(#softGlow)" opacity="0.9">
    <path d="M295 420 Q290 480 300 550 Q295 600 310 650 Q330 720 370 780 Q400 820 430 780 Q470 720 490 650 Q505 600 500 550 Q510 480 505 420 Q450 400 400 395 Q350 400 295 420 Z" fill="url(#dressGrad)"/>
    <path d="M295 420 Q310 440 340 445 Q370 448 400 446 Q430 448 460 445 Q490 440 505 420 Q480 405 400 398 Q320 405 295 420 Z" fill="#3a2078" opacity="0.6"/>
  </g>
  <g opacity="0.25">
    <line x1="80" y1="200" x2="180" y2="200" stroke="#00d4ff" stroke-width="1" stroke-dasharray="4,8"/>
    <line x1="620" y1="200" x2="720" y2="200" stroke="#ff00aa" stroke-width="1" stroke-dasharray="4,8"/>
    <line x1="60" y1="500" x2="140" y2="500" stroke="#7b68ee" stroke-width="1" stroke-dasharray="4,8"/>
    <line x1="660" y1="500" x2="740" y2="500" stroke="#00d4ff" stroke-width="1" stroke-dasharray="4,8"/>
    <line x1="100" y1="800" x2="200" y2="800" stroke="#ff00aa" stroke-width="1" stroke-dasharray="4,8"/>
    <line x1="600" y1="800" x2="700" y2="800" stroke="#7b68ee" stroke-width="1" stroke-dasharray="4,8"/>
  </g>
  <g opacity="0.12">
    <circle cx="100" cy="150" r="3" fill="#00d4ff"/>
    <circle cx="700" cy="120" r="2.5" fill="#ff00aa"/>
    <circle cx="80" cy="400" r="2" fill="#7b68ee"/>
    <circle cx="720" cy="380" r="3" fill="#00d4ff"/>
    <circle cx="120" cy="650" r="2.5" fill="#ff00aa"/>
    <circle cx="680" cy="620" r="2" fill="#7b68ee"/>
    <circle cx="90" cy="900" r="3" fill="#00d4ff"/>
    <circle cx="710" cy="880" r="2.5" fill="#ff00aa"/>
  </g>
</svg>