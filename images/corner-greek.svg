<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- 希腊卷草纹角落 - 古希腊莨苕叶卷草纹 -->
  <defs>
    <linearGradient id="greekCornerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C9A86C"/>
      <stop offset="100%" style="stop-color:#E8D5C4"/>
    </linearGradient>
  </defs>
  
  <!-- 角落背景 -->
  <path d="M0 0 L100 0 L100 25 Q75 25 75 50 Q75 75 50 75 Q25 75 25 100 L0 100 Z" 
        fill="url(#greekCornerGrad)" opacity="0.1"/>
  
  <!-- 主卷草纹 -->
  <g stroke="#C9A86C" stroke-width="2" fill="none">
    <!-- 主茎 -->
    <path d="M0 0 Q30 5 40 30 Q45 50 30 65 Q20 75 10 70"/>
    <path d="M0 0 Q5 30 30 40 Q50 45 65 30 Q75 20 70 10"/>
  </g>
  
  <!-- 莨苕叶装饰 -->
  <g fill="#C9A86C" opacity="0.7">
    <!-- 叶子1 -->
    <path d="M25 25 Q35 20 40 30 Q35 40 25 35 Q20 30 25 25"/>
    <!-- 叶子2 -->
    <path d="M50 15 Q60 10 65 20 Q60 30 50 25 Q45 20 50 15"/>
    <!-- 叶子3 -->
    <path d="M15 50 Q25 45 30 55 Q25 65 15 60 Q10 55 15 50"/>
    <!-- 叶子4 -->
    <path d="M35 45 Q45 40 50 50 Q45 60 35 55 Q30 50 35 45"/>
  </g>
  
  <!-- 卷涡装饰 -->
  <g stroke="#C9A86C" stroke-width="1.5" fill="none">
    <path d="M60 25 Q65 20 70 25 Q75 30 70 35 Q65 40 60 35"/>
    <path d="M25 60 Q30 55 35 60 Q40 65 35 70 Q30 75 25 70"/>
    <path d="M45 35 Q50 30 55 35 Q60 40 55 45 Q50 50 45 45"/>
  </g>
  
  <!-- 藤蔓线条 -->
  <g stroke="#E8D5C4" stroke-width="1" fill="none" opacity="0.6">
    <path d="M10 10 Q25 15 30 30"/>
    <path d="M20 5 Q35 12 40 25"/>
    <path d="M5 25 Q20 35 25 50"/>
  </g>
  
  <!-- 小花装饰 -->
  <g fill="#E8D5C4" opacity="0.5">
    <circle cx="30" cy="30" r="3"/>
    <circle cx="55" cy="20" r="2.5"/>
    <circle cx="20" cy="55" r="2.5"/>
    <circle cx="45" cy="40" r="2"/>
  </g>
  
  <!-- 角落装饰点 -->
  <g fill="#C9A86C" opacity="0.4">
    <circle cx="5" cy="5" r="2"/>
    <circle cx="85" cy="10" r="1.5"/>
    <circle cx="10" cy="85" r="1.5"/>
    <circle cx="70" cy="30" r="1"/>
    <circle cx="30" cy="70" r="1"/>
  </g>
  
  <!-- 外框线 -->
  <path d="M0 0 L85 0 Q85 15 70 15 Q55 15 55 30 Q55 45 40 45 Q25 45 25 60 Q25 75 10 75 Q10 90 0 90 Z" 
        fill="none" stroke="#C9A86C" stroke-width="1" opacity="0.5"/>
  
  <!-- 细线装饰 -->
  <path d="M80 5 Q75 10 80 15" stroke="#E8D5C4" stroke-width="0.8" fill="none" opacity="0.4"/>
  <path d="M5 80 Q10 75 15 80" stroke="#E8D5C4" stroke-width="0.8" fill="none" opacity="0.4"/>
</svg>