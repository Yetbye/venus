<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 80" fill="none">
  <!-- 山形分隔线 - 国画山水风格 -->
  <defs>
    <linearGradient id="dividerMountainGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2C3E50"/>
      <stop offset="50%" style="stop-color:#4a5f7a"/>
      <stop offset="100%" style="stop-color:#5D6D7E"/>
    </linearGradient>
  </defs>
  
  <!-- 远山层 - 最淡 -->
  <path d="M0 60 Q100 40 200 55 Q300 70 400 50 Q500 30 600 48 Q700 65 800 45 Q900 25 1000 42 Q1100 60 1200 50 L1200 80 L0 80 Z" 
        fill="url(#dividerMountainGrad)" opacity="0.2"/>
  
  <!-- 中山层 -->
  <path d="M0 65 Q80 45 160 60 Q240 75 320 55 Q400 35 480 52 Q560 70 640 48 Q720 28 800 45 Q880 62 960 42 Q1040 22 1120 38 Q1200 55 1200 50 L1200 80 L0 80 Z" 
        fill="url(#dividerMountainGrad)" opacity="0.35"/>
  
  <!-- 近山层 -->
  <path d="M0 70 Q60 50 120 65 Q180 80 240 60 Q300 40 360 55 Q420 70 480 52 Q540 35 600 50 Q660 65 720 48 Q780 32 840 47 Q900 62 960 45 Q1020 28 1080 43 Q1140 58 1200 48 L1200 80 L0 80 Z" 
        fill="url(#dividerMountainGrad)" opacity="0.5"/>
  
  <!-- 主峰轮廓线 -->
  <path d="M0 72 Q50 52 100 68 Q150 84 200 62 Q250 40 300 58 Q350 76 400 55 Q450 34 500 52 Q550 70 600 50 Q650 30 700 48 Q750 66 800 46 Q850 26 900 44 Q950 62 1000 42 Q1050 22 1100 40 Q1150 58 1200 50" 
        stroke="#2C3E50" stroke-width="1.5" fill="none"/>
  
  <!-- 山脊线 -->
  <g stroke="#1a1a1a" stroke-width="0.8" fill="none" opacity="0.4">
    <path d="M50 60 Q75 55 100 65"/>
    <path d="M250 50 Q275 45 300 55"/>
    <path d="M450 45 Q475 40 500 50"/>
    <path d="M650 40 Q675 35 700 45"/>
    <path d="M850 35 Q875 30 900 40"/>
    <path d="M1050 32 Q1075 27 1100 37"/>
  </g>
  
  <!-- 云雾 - 留白效果 -->
  <g fill="#FFF" opacity="0.6">
    <ellipse cx="150" cy="65" rx="40" ry="8"/>
    <ellipse cx="350" cy="60" rx="35" ry="7"/>
    <ellipse cx="550" cy="55" rx="45" ry="9"/>
    <ellipse cx="750" cy="52" rx="38" ry="8"/>
    <ellipse cx="950" cy="48" rx="42" ry="8"/>
    <ellipse cx="1150" cy="45" rx="35" ry="7"/>
  </g>
  
  <!-- 山脚树木点缀 -->
  <g fill="#2C3E50" opacity="0.3">
    <ellipse cx="80" cy="75" rx="2" ry="4"/>
    <ellipse cx="280" cy="72" rx="2" ry="4"/>
    <ellipse cx="480" cy="70" rx="2" ry="4"/>
    <ellipse cx="680" cy="68" rx="2" ry="4"/>
    <ellipse cx="880" cy="66" rx="2" ry="4"/>
    <ellipse cx="1080" cy="64" rx="2" ry="4"/>
  </g>
  
  <!-- 瀑布线条 -->
  <g stroke="#FFF" stroke-width="1" fill="none" opacity="0.4">
    <path d="M200 62 Q202 70 200 78"/>
    <path d="M600 50 Q602 60 600 75"/>
    <path d="M1000 42 Q1002 52 1000 70"/>
  </g>
  
  <!-- 飞鸟 -->
  <g stroke="#1a1a1a" stroke-width="0.6" fill="none" opacity="0.3">
    <path d="M400 35 Q405 30 410 35"/>
    <path d="M800 28 Q805 23 810 28"/>
    <path d="M600 25 Q603 22 606 25"/>
  </g>
  
  <!-- 水墨渲染 -->
  <ellipse cx="600" cy="75" rx="200" ry="10" fill="#2C3E50" opacity="0.08"/>
</svg>