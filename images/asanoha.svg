<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- 麻叶纹样 - 传统日本麻叶纹 -->
  <defs>
    <linearGradient id="asaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5A8F7B"/>
      <stop offset="50%" style="stop-color:#4A7A68"/>
      <stop offset="100%" style="stop-color:#5A8F7B"/>
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect x="0" y="0" width="200" height="200" fill="#F0F7F4" opacity="0.2"/>
  
  <!-- 中心六边形 -->
  <g stroke="url(#asaGrad)" stroke-width="1.5" fill="none" opacity="0.8">
    <!-- 中心大六边形 -->
    <polygon points="100,40 152,70 152,130 100,160 48,130 48,70"/>
    
    <!-- 六边形内部放射线 -->
    <line x1="100" y1="40" x2="100" y2="100"/>
    <line x1="152" y1="70" x2="100" y2="100"/>
    <line x1="152" y1="130" x2="100" y2="100"/>
    <line x1="100" y1="160" x2="100" y2="100"/>
    <line x1="48" y1="130" x2="100" y2="100"/>
    <line x1="48" y1="70" x2="100" y2="100"/>
  </g>
  
  <!-- 外围六边形1 -->
  <g stroke="#5A8F7B" stroke-width="1" fill="none" opacity="0.5">
    <polygon points="100,10 178,55 178,145 100,190 22,145 22,55"/>
  </g>
  
  <!-- 外围六边形2 -->
  <g stroke="#5A8F7B" stroke-width="0.8" fill="none" opacity="0.3">
    <polygon points="100,0 200,58 200,142 100,200 0,142 0,58"/>
  </g>
  
  <!-- 连接线 - 形成麻叶图案 -->
  <g stroke="url(#asaGrad)" stroke-width="1" fill="none" opacity="0.6">
    <!-- 顶部区域 -->
    <line x1="100" y1="10" x2="100" y2="40"/>
    <line x1="126" y1="25" x2="126" y2="55"/>
    <line x1="74" y1="25" x2="74" y2="55"/>
    
    <!-- 右上区域 -->
    <line x1="178" y1="55" x2="152" y2="70"/>
    <line x1="165" y1="97" x2="139" y2="112"/>
    
    <!-- 右下区域 -->
    <line x1="178" y1="145" x2="152" y2="130"/>
    <line x1="165" y1="103" x2="139" y2="88"/>
    
    <!-- 底部区域 -->
    <line x1="100" y1="190" x2="100" y2="160"/>
    <line x1="126" y1="175" x2="126" y2="145"/>
    <line x1="74" y1="175" x2="74" y2="145"/>
    
    <!-- 左下区域 -->
    <line x1="22" y1="145" x2="48" y2="130"/>
    <line x1="35" y1="103" x2="61" y2="88"/>
    
    <!-- 左上区域 -->
    <line x1="22" y1="55" x2="48" y2="70"/>
    <line x1="35" y1="97" x2="61" y2="112"/>
  </g>
  
  <!-- 小六边形装饰 -->
  <g stroke="#5A8F7B" stroke-width="0.8" fill="none" opacity="0.4">
    <polygon points="100,70 126,85 126,115 100,130 74,115 74,85"/>
  </g>
  
  <!-- 对角线装饰 -->
  <g stroke="#5A8F7B" stroke-width="0.6" fill="none" opacity="0.3">
    <line x1="48" y1="70" x2="100" y2="40"/>
    <line x1="152" y1="70" x2="100" y2="40"/>
    <line x1="152" y1="130" x2="100" y2="160"/>
    <line x1="48" y1="130" x2="100" y2="160"/>
    
    <line x1="74" y1="55" x2="126" y2="55"/>
    <line x1="139" y1="88" x2="139" y2="112"/>
    <line x1="126" y1="145" x2="74" y2="145"/>
    <line x1="61" y1="112" x2="61" y2="88"/>
  </g>
  
  <!-- 填充区域 -->
  <g fill="#5A8F7B" opacity="0.1">
    <polygon points="100,40 126,55 100,70 74,55"/>
    <polygon points="152,70 165,97 139,112 126,85"/>
    <polygon points="152,130 139,112 126,145 139,158"/>
    <polygon points="100,160 126,145 100,130 74,145"/>
    <polygon points="48,130 61,112 74,145 61,158"/>
    <polygon points="48,70 61,88 74,55 61,42"/>
  </g>
  
  <!-- 角落装饰 -->
  <g fill="#5A8F7B" opacity="0.15">
    <circle cx="100" cy="100" r="5"/>
    <circle cx="100" cy="40" r="3"/>
    <circle cx="152" cy="70" r="3"/>
    <circle cx="152" cy="130" r="3"/>
    <circle cx="100" cy="160" r="3"/>
    <circle cx="48" cy="130" r="3"/>
    <circle cx="48" cy="70" r="3"/>
  </g>
</svg>