<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="exprGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1B4B6F"/>
      <stop offset="100%" style="stop-color:#2E6B8F"/>
    </linearGradient>
  </defs>
  
  <!-- 人脸轮廓 -->
  <ellipse cx="200" cy="180" rx="90" ry="110" fill="none" stroke="#1B4B6F" stroke-width="2"/>
  
  <!-- 额头线条 - 表情纹理 -->
  <path d="M160 130 Q200 125 240 130" fill="none" stroke="#1B4B6F" stroke-width="1.5" opacity="0.6"/>
  <path d="M165 145 Q200 140 235 145" fill="none" stroke="#1B4B6F" stroke-width="1.5" opacity="0.4"/>
  
  <!-- 左眼 - 细腻表情 -->
  <ellipse cx="165" cy="170" rx="18" ry="12" fill="none" stroke="#1B4B6F" stroke-width="2"/>
  <circle cx="165" cy="170" r="6" fill="#1B4B6F"/>
  <path d="M145 160 Q165 150 185 160" fill="none" stroke="#1B4B6F" stroke-width="1.5"/>
  
  <!-- 右眼 - 细腻表情 -->
  <ellipse cx="235" cy="170" rx="18" ry="12" fill="none" stroke="#1B4B6F" stroke-width="2"/>
  <circle cx="235" cy="170" r="6" fill="#1B4B6F"/>
  <path d="M215 160 Q235 150 255 160" fill="none" stroke="#1B4B6F" stroke-width="1.5"/>
  
  <!-- 鼻子 - 简洁线条 -->
  <path d="M200 175 L195 210 L205 210" fill="none" stroke="#1B4B6F" stroke-width="1.5"/>
  
  <!-- 嘴巴 - 微妙微笑 -->
  <path d="M170 240 Q200 260 230 240" fill="none" stroke="#E85D4E" stroke-width="2.5"/>
  <path d="M175 238 Q200 250 225 238" fill="none" stroke="#E85D4E" stroke-width="1" opacity="0.5"/>
  
  <!-- 脸颊线条 -->
  <path d="M130 200 Q125 220 135 240" fill="none" stroke="#1B4B6F" stroke-width="1.5" opacity="0.5"/>
  <path d="M270 200 Q275 220 265 240" fill="none" stroke="#1B4B6F" stroke-width="1.5" opacity="0.5"/>
  
  <!-- 下巴轮廓 -->
  <path d="M160 280 Q200 305 240 280" fill="none" stroke="#1B4B6F" stroke-width="2"/>
  
  <!-- 情感表达线条 -->
  <path d="M110 180 Q90 200 100 230" fill="none" stroke="#E85D4E" stroke-width="1.5" opacity="0.6"/>
  <path d="M290 180 Q310 200 300 230" fill="none" stroke="#E85D4E" stroke-width="1.5" opacity="0.6"/>
  
  <!-- 装饰性圆点 -->
  <circle cx="120" cy="150" r="3" fill="#E85D4E" opacity="0.4"/>
  <circle cx="280" cy="150" r="3" fill="#E85D4E" opacity="0.4"/>
  <circle cx="200" cy="100" r="4" fill="#E85D4E" opacity="0.3"/>
</svg>