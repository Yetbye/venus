<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" fill="none">
  <!-- 梅花 - 国画工笔/写意风格 -->
  <defs>
    <radialGradient id="petalGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FF6B5B"/>
      <stop offset="70%" style="stop-color:#E85D4E"/>
      <stop offset="100%" style="stop-color:#D1483C"/>
    </radialGradient>
    <linearGradient id="branchGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="50%" style="stop-color:#2C3E50"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
  </defs>
  
  <!-- 主枝干 - 苍劲有力 -->
  <path d="M20 280 Q60 250 80 200 Q100 150 120 120 Q140 90 160 70 Q180 50 200 35" 
        stroke="url(#branchGrad)" stroke-width="6" fill="none" stroke-linecap="round"/>
  
  <!-- 主枝干纹理 -->
  <path d="M25 275 Q60 248 78 200 Q96 152 115 122" 
        stroke="#3d4f5f" stroke-width="2" fill="none" opacity="0.4"/>
  
  <!-- 分枝1 -->
  <path d="M120 120 Q150 110 180 115 Q210 120 230 105" 
        stroke="url(#branchGrad)" stroke-width="4" fill="none" stroke-linecap="round"/>
  
  <!-- 分枝2 -->
  <path d="M80 200 Q100 180 130 175 Q160 170 175 150" 
        stroke="url(#branchGrad)" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- 分枝3 -->
  <path d="M160 70 Q180 60 200 65 Q220 70 240 55" 
        stroke="url(#branchGrad)" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- 细枝 -->
  <g stroke="#2C3E50" stroke-width="1.5" fill="none" opacity="0.7">
    <path d="M180 115 Q190 100 195 80"/>
    <path d="M130 175 Q140 160 145 140"/>
    <path d="M200 65 Q210 50 215 35"/>
    <path d="M100 150 Q85 130 75 110"/>
  </g>
  
  <!-- 梅花1 - 盛开 -->
  <g transform="translate(180, 80)">
    <!-- 花瓣 -->
    <ellipse cx="0" cy="-12" rx="6" ry="10" fill="url(#petalGrad)" transform="rotate(0)"/>
    <ellipse cx="11" cy="-4" rx="6" ry="10" fill="url(#petalGrad)" transform="rotate(72)"/>
    <ellipse cx="7" cy="10" rx="6" ry="10" fill="url(#petalGrad)" transform="rotate(144)"/>
    <ellipse cx="-7" cy="10" rx="6" ry="10" fill="url(#petalGrad)" transform="rotate(216)"/>
    <ellipse cx="-11" cy="-4" rx="6" ry="10" fill="url(#petalGrad)" transform="rotate(288)"/>
    <!-- 花蕊 -->
    <circle cx="0" cy="0" r="3" fill="#FFD700"/>
    <g stroke="#FFD700" stroke-width="0.8">
      <line x1="0" y1="0" x2="0" y2="-6"/>
      <line x1="0" y1="0" x2="5" y2="-3"/>
      <line x1="0" y1="0" x2="4" y2="4"/>
      <line x1="0" y1="0" x2="-4" y2="4"/>
      <line x1="0" y1="0" x2="-5" y2="-3"/>
    </g>
  </g>
  
  <!-- 梅花2 -->
  <g transform="translate(130, 140)">
    <ellipse cx="0" cy="-10" rx="5" ry="8" fill="url(#petalGrad)"/>
    <ellipse cx="9" cy="-3" rx="5" ry="8" fill="url(#petalGrad)" transform="rotate(72)"/>
    <ellipse cx="6" cy="8" rx="5" ry="8" fill="url(#petalGrad)" transform="rotate(144)"/>
    <ellipse cx="-6" cy="8" rx="5" ry="8" fill="url(#petalGrad)" transform="rotate(216)"/>
    <ellipse cx="-9" cy="-3" rx="5" ry="8" fill="url(#petalGrad)" transform="rotate(288)"/>
    <circle cx="0" cy="0" r="2.5" fill="#FFD700"/>
  </g>
  
  <!-- 梅花3 -->
  <g transform="translate(230, 55)">
    <ellipse cx="0" cy="-11" rx="5.5" ry="9" fill="url(#petalGrad)"/>
    <ellipse cx="10" cy="-3.5" rx="5.5" ry="9" fill="url(#petalGrad)" transform="rotate(72)"/>
    <ellipse cx="6.5" cy="9" rx="5.5" ry="9" fill="url(#petalGrad)" transform="rotate(144)"/>
    <ellipse cx="-6.5" cy="9" rx="5.5" ry="9" fill="url(#petalGrad)" transform="rotate(216)"/>
    <ellipse cx="-10" cy="-3.5" rx="5.5" ry="9" fill="url(#petalGrad)" transform="rotate(288)"/>
    <circle cx="0" cy="0" r="2.5" fill="#FFD700"/>
  </g>
  
  <!-- 梅花4 - 含苞 -->
  <g transform="translate(75, 110)">
    <ellipse cx="0" cy="0" rx="8" ry="12" fill="#E85D4E" opacity="0.9"/>
    <ellipse cx="0" cy="-3" rx="5" ry="7" fill="#FF6B5B" opacity="0.7"/>
  </g>
  
  <!-- 梅花5 -->
  <g transform="translate(215, 35)">
    <ellipse cx="0" cy="-9" rx="5" ry="8" fill="url(#petalGrad)"/>
    <ellipse cx="8" cy="-3" rx="5" ry="8" fill="url(#petalGrad)" transform="rotate(72)"/>
    <ellipse cx="5" cy="7" rx="5" ry="8" fill="url(#petalGrad)" transform="rotate(144)"/>
    <ellipse cx="-5" cy="7" rx="5" ry="8" fill="url(#petalGrad)" transform="rotate(216)"/>
    <ellipse cx="-8" cy="-3" rx="5" ry="8" fill="url(#petalGrad)" transform="rotate(288)"/>
    <circle cx="0" cy="0" r="2" fill="#FFD700"/>
  </g>
  
  <!-- 梅花6 - 半开 -->
  <g transform="translate(145, 160)">
    <path d="M0 -10 Q5 -5 0 0 Q-5 -5 0 -10" fill="#E85D4E"/>
    <path d="M8 -3 Q5 2 0 0 Q3 -5 8 -3" fill="#E85D4E"/>
    <path d="M5 7 Q0 5 -2 0 Q3 2 5 7" fill="#E85D4E"/>
    <path d="M-5 7 Q0 5 2 0 Q-3 2 -5 7" fill="#E85D4E"/>
    <path d="M-8 -3 Q-5 2 0 0 Q-3 -5 -8 -3" fill="#E85D4E"/>
  </g>
  
  <!-- 花苞 -->
  <g fill="#D1483C" opacity="0.8">
    <ellipse cx="195" cy="95" rx="4" ry="6"/>
    <ellipse cx="85" cy="130" rx="3" ry="5"/>
    <ellipse cx="165" cy="55" rx="3.5" ry="5.5"/>
  </g>
  
  <!-- 枝干上的纹理点 -->
  <g fill="#1a1a1a" opacity="0.4">
    <ellipse cx="100" cy="200" rx="2" ry="1"/>
    <ellipse cx="140" cy="100" rx="1.5" ry="0.8"/>
    <ellipse cx="180" cy="60" rx="2" ry="1"/>
  </g>
</svg>