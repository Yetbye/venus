<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- 摄像头主体 -->
  <rect x="160" y="100" width="80" height="60" rx="8" fill="none" stroke="#E85D4E" stroke-width="2"/>
  
  <!-- 摄像头镜头 -->
  <circle cx="200" cy="130" r="20" fill="none" stroke="#E85D4E" stroke-width="2"/>
  <circle cx="200" cy="130" r="12" fill="none" stroke="#E85D4E" stroke-width="1.5"/>
  <circle cx="200" cy="130" r="5" fill="#E85D4E" opacity="0.6"/>
  
  <!-- 摄像头支架 -->
  <path d="M190 160 L185 200 L215 200 L210 160" fill="none" stroke="#E85D4E" stroke-width="2"/>
  <rect x="170" y="200" width="60" height="8" rx="2" fill="none" stroke="#E85D4E" stroke-width="1.5"/>
  
  <!-- 录制指示灯 -->
  <circle cx="225" cy="115" r="4" fill="#E85D4E" opacity="0.8"/>
  
  <!-- 购物袋 -->
  <path d="M260 220 L260 280 Q260 300 280 300 L340 300 Q360 300 360 280 L360 220 Z" fill="none" stroke="#E85D4E" stroke-width="2"/>
  <path d="M280 220 L280 200 Q280 180 300 180 Q320 180 320 200 L320 220" fill="none" stroke="#E85D4E" stroke-width="1.5"/>
  
  <!-- 购物袋装饰 -->
  <circle cx="290" cy="260" r="8" fill="none" stroke="#E85D4E" stroke-width="1" opacity="0.6"/>
  <circle cx="330" cy="260" r="8" fill="none" stroke="#E85D4E" stroke-width="1" opacity="0.6"/>
  <path d="M285 290 L295 290" fill="none" stroke="#E85D4E" stroke-width="1" opacity="0.5"/>
  <path d="M325 290 L335 290" fill="none" stroke="#E85D4E" stroke-width="1" opacity="0.5"/>
  
  <!-- 直播弹幕/评论气泡 -->
  <ellipse cx="100" cy="150" rx="40" ry="25" fill="none" stroke="#E85D4E" stroke-width="1.5" opacity="0.7"/>
  <path d="M85 170 L75 190 L95 175" fill="none" stroke="#E85D4E" stroke-width="1.5" opacity="0.7"/>
  <line x1="75" y1="145" x2="125" y2="145" stroke="#E85D4E" stroke-width="1" opacity="0.4"/>
  <line x1="75" y1="155" x2="115" y2="155" stroke="#E85D4E" stroke-width="1" opacity="0.4"/>
  
  <ellipse cx="120" cy="220" rx="35" ry="22" fill="none" stroke="#E85D4E" stroke-width="1.5" opacity="0.6"/>
  <path d="M108 238 L100 255 L118 242" fill="none" stroke="#E85D4E" stroke-width="1.5" opacity="0.6"/>
  <line x1="100" y1="215" x2="140" y2="215" stroke="#E85D4E" stroke-width="1" opacity="0.3"/>
  <line x1="100" y1="225" x2="130" y2="225" stroke="#E85D4E" stroke-width="1" opacity="0.3"/>
  
  <!-- 爱心/点赞 -->
  <path d="M320 120 Q320 105 335 105 Q350 105 350 120 Q350 135 335 150 Q320 135 320 120" fill="none" stroke="#E85D4E" stroke-width="1.5"/>
  <path d="M340 100 Q340 90 350 90 Q360 90 360 100 Q360 110 350 120" fill="none" stroke="#E85D4E" stroke-width="1" opacity="0.5"/>
  
  <!-- 直播状态文字区域 -->
  <rect x="150" y="260" width="100" height="30" rx="4" fill="none" stroke="#E85D4E" stroke-width="1.5" opacity="0.6"/>
  <circle cx="165" cy="275" r="5" fill="#E85D4E" opacity="0.8"/>
  <line x1="180" y1="270" x2="230" y2="270" stroke="#E85D4E" stroke-width="1" opacity="0.4"/>
  <line x1="180" y1="280" x2="210" y2="280" stroke="#E85D4E" stroke-width="1" opacity="0.4"/>
  
  <!-- 装饰元素 -->
  <circle cx="60" cy="280" r="4" fill="#E85D4E" opacity="0.3"/>
  <circle cx="380" cy="180" r="4" fill="#E85D4E" opacity="0.3"/>
  <circle cx="50" cy="100" r="3" fill="#E85D4E" opacity="0.3"/>
