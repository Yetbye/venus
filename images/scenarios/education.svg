      <line x1="88" y1="41" x2="136" y2="48" stroke="#fff" stroke-width="1" opacity="0.2"/>
      <line x1="89" y1="54" x2="134" y2="61" stroke="#fff" stroke-width="1" opacity="0.22"/>
