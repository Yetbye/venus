<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="eduBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#faf6f0"/>
      <stop offset="50%" style="stop-color:#f5ede0"/>
      <stop offset="100%" style="stop-color:#efe5d4"/>
    </linearGradient>
    <linearGradient id="bookGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c49a48"/>
      <stop offset="50%" style="stop-color:#a67c30"/>
      <stop offset="100%" style="stop-color:#8b6528"/>
    </linearGradient>
    <radialGradient id="eduGlow" cx="50%" cy="45%" r="50%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:0.18"/>
      <stop offset="60%" style="stop-color:#e8b84a;stop-opacity:0.06"/>
      <stop offset="100%" style="stop-color:#faf6f0;stop-opacity:0"/>
    </radialGradient>
    <filter id="bookShadow">
      <feDropShadow dx="3" dy="5" stdDeviation="6" flood-opacity="0.15"/>
    </filter>
    <filter id="lightRays">
      <feGaussianBlur in="SourceGraphic" stdDeviation="15"/>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#eduBg)"/>
  <ellipse cx="200" cy="140" rx="170" ry="130" fill="url(#eduGlow)"/>
  <g filter="url(#lightRays)" opacity="0.08">
