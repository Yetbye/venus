    <path d="M260 215 L365 215 Q373 215 373 223 L373 248 Q373 256 366 257 L359 258 L356 267 L351 258 L260 258 Q252 258 252 250 L252 223 Q252 215 260 215 Z" fill="url(#aiBubble)" stroke="#e8ecf2" stroke-width="1"/>
    <text x="258" y="233" font-family="Arial, sans-serif" font-size="11" fill="#34495e">好的！我们的流程包括：</text>
    <text x="258" y="249" font-family="Arial, sans-serif" font-size="11" fill="#4a90d9">需求沟通 → 形象设计 → 训练</text>
