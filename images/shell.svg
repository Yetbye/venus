<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- 贝壳元素 - 维纳斯的诞生 -->
  <defs>
    <linearGradient id="shellGrad1" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#C9A86C"/>
      <stop offset="50%" style="stop-color:#E8D5C4"/>
      <stop offset="100%" style="stop-color:#C9A86C"/>
    </linearGradient>
    <linearGradient id="shellGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E8D5C4"/>
      <stop offset="50%" style="stop-color:#C9A86C"/>
      <stop offset="100%" style="stop-color:#E8D5C4"/>
    </linearGradient>
    <radialGradient id="shellCenter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#E8D5C4"/>
      <stop offset="100%" style="stop-color:#C9A86C"/>
    </radialGradient>
  </defs>
  
  <!-- 贝壳外轮廓 -->
  <path d="M100 180 Q30 150 20 100 Q15 70 40 50 Q65 30 100 25 Q135 30 160 50 Q185 70 180 100 Q170 150 100 180" 
        fill="url(#shellGrad1)" opacity="0.9"/>
  
  <!-- 贝壳底部 -->
  <path d="M85 175 Q100 185 115 175" 
        stroke="#C9A86C" stroke-width="2" fill="none"/>
  
  <!-- 螺旋纹理 - 放射状线条 -->
  <g stroke="#C9A86C" stroke-width="1.5" fill="none" opacity="0.8">
    <!-- 左侧纹理 -->
    <path d="M100 100 Q70 110 45 130"/>
    <path d="M100 100 Q60 95 35 105"/>
    <path d="M100 100 Q65 75 45 60"/>
    <path d="M100 100 Q80 60 70 40"/>
    
    <!-- 右侧纹理 -->
    <path d="M100 100 Q130 110 155 130"/>
    <path d="M100 100 Q140 95 165 105"/>
    <path d="M100 100 Q135 75 155 60"/>
    <path d="M100 100 Q120 60 130 40"/>
    
    <!-- 中间纹理 -->
    <path d="M100 100 Q100 140 100 170"/>
    <path d="M100 100 Q90 70 85 35"/>
    <path d="M100 100 Q110 70 115 35"/>
  </g>
  
  <!-- 螺旋中心 -->
  <ellipse cx="100" cy="100" rx="15" ry="12" fill="url(#shellCenter)" opacity="0.9"/>
  <ellipse cx="100" cy="100" rx="8" ry="6" fill="#C9A86C" opacity="0.6"/>
  
  <!-- 装饰性珍珠光泽 -->
  <ellipse cx="95" cy="95" rx="4" ry="3" fill="#FFF" opacity="0.4"/>
  
  <!-- 边缘装饰 -->
  <g fill="#C9A86C" opacity="0.6">
    <ellipse cx="25" cy="100" rx="3" ry="2"/>
    <ellipse cx="35" cy="75" rx="3" ry="2"/>
    <ellipse cx="55" cy="55" rx="3" ry="2"/>
    <ellipse cx="80" cy="40" rx="3" ry="2"/>
    <ellipse cx="120" cy="40" rx="3" ry="2"/>
    <ellipse cx="145" cy="55" rx="3" ry="2"/>
    <ellipse cx="165" cy="75" rx="3" ry="2"/>
    <ellipse cx="175" cy="100" rx="3" ry="2"/>
  </g>
  
  <!-- 内层纹理 -->
  <path d="M100 112 Q75 120 55 140" stroke="#E8D5C4" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M100 112 Q125 120 145 140" stroke="#E8D5C4" stroke-width="1" fill="none" opacity="0.5"/>
</svg>