<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- 黄金螺旋 - 斐波那契螺旋 -->
  <defs>
    <linearGradient id="spiralGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8D5C4"/>
      <stop offset="50%" style="stop-color:#C9A86C"/>
      <stop offset="100%" style="stop-color:#E8D5C4"/>
    </linearGradient>
  </defs>
  
  <!-- 黄金矩形网格 - 辅助美学 -->
  <g stroke="#C9A86C" stroke-width="0.3" fill="none" opacity="0.2">
    <!-- 最大正方形 -->
    <rect x="0" y="0" width="200" height="200"/>
    <!-- 第二个正方形 -->
    <rect x="0" y="0" width="123.6" height="123.6"/>
    <!-- 第三个正方形 -->
    <rect x="0" y="123.6" width="76.4" height="76.4"/>
    <!-- 第四个正方形 -->
    <rect x="76.4" y="123.6" width="47.2" height="47.2"/>
    <!-- 第五个正方形 -->
    <rect x="76.4" y="123.6" width="29.2" height="29.2"/>
    <!-- 第六个正方形 -->
    <rect x="105.6" y="123.6" width="18" height="18"/>
    <!-- 第七个正方形 -->
    <rect x="105.6" y="141.6" width="11.2" height="11.2"/>
    <!-- 第八个正方形 -->
    <rect x="116.8" y="141.6" width="6.8" height="6.8"/>
  </g>
  
  <!-- 黄金螺旋主线条 -->
  <path d="M200 200 
           Q200 0 100 0 
           Q0 0 0 76.4 
           Q0 152.8 76.4 152.8 
           Q123.6 152.8 123.6 123.6 
           Q123.6 94.4 105.6 94.4 
           Q87.6 94.4 87.6 108.4 
           Q87.6 122.4 98.8 122.4 
           Q105.6 122.4 105.6 116.8 
           Q105.6 111.2 100 111.2" 
        stroke="url(#spiralGrad)" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- 螺旋内部装饰线 -->
  <path d="M200 200 
           Q200 0 100 0 
           Q0 0 0 76.4 
           Q0 152.8 76.4 152.8 
           Q123.6 152.8 123.6 123.6 
           Q123.6 94.4 105.6 94.4 
           Q87.6 94.4 87.6 108.4 
           Q87.6 122.4 98.8 122.4 
           Q105.6 122.4 105.6 116.8 
           Q105.6 111.2 100 111.2" 
        stroke="#E8D5C4" stroke-width="1" fill="none" opacity="0.5" transform="translate(2, 2)"/>
  
  <!-- 螺旋中心装饰 -->
  <circle cx="100" cy="111.2" r="4" fill="#C9A86C" opacity="0.8"/>
  <circle cx="100" cy="111.2" r="2" fill="#E8D5C4"/>
  
  <!-- 外圈装饰圆环 -->
  <circle cx="100" cy="100" r="95" stroke="#C9A86C" stroke-width="0.5" fill="none" opacity="0.3"/>
  <circle cx="100" cy="100" r="90" stroke="#C9A86C" stroke-width="0.3" fill="none" opacity="0.2"/>
  
  <!-- 斐波那契数列点装饰 -->
  <g fill="#C9A86C" opacity="0.4">
    <circle cx="200" cy="200" r="3"/>
    <circle cx="0" cy="0" r="2.5"/>
    <circle cx="0" cy="152.8" r="2"/>
    <circle cx="123.6" cy="152.8" r="1.5"/>
    <circle cx="123.6" cy="94.4" r="1"/>
  </g>
  
  <!-- 优雅射线装饰 -->
  <g stroke="#C9A86C" stroke-width="0.5" opacity="0.15">
    <line x1="100" y1="100" x2="200" y2="0"/>
    <line x1="100" y1="100" x2="0" y2="0"/>
    <line x1="100" y1="100" x2="0" y2="200"/>
    <line x1="100" y1="100" x2="200" y2="200"/>
    <line x1="100" y1="100" x2="100" y2="0"/>
    <line x1="100" y1="100" x2="200" y2="100"/>
    <line x1="100" y1="100" x2="100" y2="200"/>
    <line x1="100" y1="100" x2="0" y2="100"/>
  </g>
</svg>