<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" fill="none">
  <!-- 国画山水轮廓 - 水墨山水留白美学 -->
  <defs>
    <linearGradient id="mountainGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2C3E50"/>
      <stop offset="50%" style="stop-color:#4a5f7a"/>
      <stop offset="100%" style="stop-color:#5D6D7E"/>
    </linearGradient>
    <linearGradient id="mountainGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a5f7a"/>
      <stop offset="100%" style="stop-color:#7f94a8"/>
    </linearGradient>
    <linearGradient id="mountainGrad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5D6D7E"/>
      <stop offset="100%" style="stop-color:#9aaec0"/>
    </linearGradient>
  </defs>
  
  <!-- 远山 - 最淡 -->
  <path d="M0 150 Q50 100 100 120 Q150 140 200 110 Q250 80 300 100 Q350 120 400 90 L400 200 L0 200 Z" 
        fill="url(#mountainGrad3)" opacity="0.3"/>
  
  <!-- 中远山 -->
  <path d="M-20 180 Q30 130 80 145 Q130 160 180 135 Q230 110 280 125 Q330 140 380 115 Q420 90 420 200 L-20 200 Z" 
        fill="url(#mountainGrad2)" opacity="0.4"/>
  
  <!-- 中山 -->
  <path d="M0 200 L0 160 Q40 110 90 130 Q140 150 190 120 Q240 90 290 110 Q340 130 390 100 Q420 80 400 200 Z" 
        fill="url(#mountainGrad1)" opacity="0.5"/>
  
  <!-- 主峰 - 左侧 -->
  <path d="M-10 200 L-10 140 Q20 80 60 100 Q100 120 130 90 Q160 60 180 85 Q200 110 190 200 Z" 
        fill="url(#mountainGrad1)" opacity="0.7"/>
  
  <!-- 主峰 - 右侧 -->
  <path d="M220 200 Q230 130 260 90 Q290 50 320 75 Q350 100 370 85 Q390 70 410 200 Z" 
        fill="url(#mountainGrad1)" opacity="0.75"/>
  
  <!-- 近山 -->
  <path d="M0 200 L0 170 Q30 140 70 155 Q110 170 150 150 Q190 130 230 145 Q270 160 310 140 Q350 120 400 150 L400 200 Z" 
        fill="#2C3E50" opacity="0.85"/>
  
  <!-- 山脊线 - 主峰 -->
  <path d="M20 140 Q50 90 90 110 Q130 130 160 100" 
        stroke="#1a1a1a" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M260 90 Q290 55 320 80 Q350 105 370 90" 
        stroke="#1a1a1a" stroke-width="1.5" fill="none" opacity="0.6"/>
  
  <!-- 云雾 - 留白效果 -->
  <g fill="#FFF" opacity="0.7">
    <ellipse cx="150" cy="130" rx="60" ry="15"/>
    <ellipse cx="280" cy="110" rx="50" ry="12"/>
    <ellipse cx="80" cy="145" rx="40" ry="10"/>
    <ellipse cx="350" cy="130" rx="45" ry="11"/>
  </g>
  
  <!-- 瀑布 -->
  <path d="M165 100 Q168 120 166 140 Q164 160 167 180" 
        stroke="#FFF" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M172 105 Q175 125 173 145 Q171 165 174 185" 
        stroke="#FFF" stroke-width="1.5" fill="none" opacity="0.4"/>
  
  <!-- 树木点缀 -->
  <g fill="#1a1a1a" opacity="0.5">
    <!-- 山顶树木 -->
    <ellipse cx="60" cy="102" rx="2" ry="4"/>
    <ellipse cx="65" cy="105" rx="1.5" ry="3"/>
    <ellipse cx="320" cy="77" rx="2" ry="4"/>
    <ellipse cx="325" cy="80" rx="1.5" ry="3"/>
    <!-- 山腰树木 -->
    <ellipse cx="120" cy="140" rx="1.5" ry="3"/>
    <ellipse cx="270" cy="125" rx="1.5" ry="3"/>
  </g>
  
  <!-- 山脚房屋 -->
  <g fill="#2C3E50" opacity="0.6">
    <rect x="140" y="155" width="8" height="6"/>
    <polygon points="139,155 144,150 149,155" fill="#2C3E50"/>
    <rect x="300" y="148" width="6" height="5"/>
    <polygon points="299,148 303,144 307,148" fill="#2C3E50"/>
  </g>
  
  <!-- 飞鸟 -->
  <g stroke="#1a1a1a" stroke-width="0.8" fill="none" opacity="0.4">
    <path d="M250 60 Q255 55 260 60"/>
    <path d="M265 55 Q270 50 275 55"/>
    <path d="M240 70 Q243 67 246 70"/>
  </g>
  
  <!-- 水墨渲染效果 -->
  <ellipse cx="100" cy="180" rx="80" ry="20" fill="#2C3E50" opacity="0.1"/>
  <ellipse cx="320" cy="175" rx="60" ry="15" fill="#2C3E50" opacity="0.1"/>
</svg>