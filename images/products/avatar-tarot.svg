<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <linearGradient id="tarotBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0812"/>
      <stop offset="50%" style="stop-color:#14101f"/>
      <stop offset="100%" style="stop-color:#0a0812"/>
    </linearGradient>
    <linearGradient id="tarotHair" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a0080"/>
      <stop offset="50%" style="stop-color:#6b0fa0"/>
      <stop offset="100%" style="stop-color:#9b30ff"/>
    </linearGradient>
    <linearGradient id="tarotSkin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8dce8"/>
      <stop offset="100%" style="stop-color:#d4c4d8"/>
    </linearGradient>
    <radialGradient id="mysticGlow" cx="50%" cy="45%" r="50%">
      <stop offset="0%" style="stop-color:#9b30ff;stop-opacity:0.3"/>
      <stop offset="55%" style="stop-color:#6b0fa0;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#0a0812;stop-opacity:0"/>
