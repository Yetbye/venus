<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="glitchRed" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff0040;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#ff0040;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#ff0040;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="glitchCyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ffff;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#00ffff;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#00ffff;stop-opacity:0"/>
    </linearGradient>
    <filter id="glitchBlur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" x="0" y="0" width="100%" height="100%"/>
    </filter>
  </defs>
  <rect width="800" height="600" fill="#000" opacity="0"/>
  <g filter="url(#glitchBlur)">
    <rect x="0" y="45" width="800" height="3" fill="#ff0040" opacity="0.35">
      <animate attributeName="x" values="-50;30;-20;10;-50" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="width" values="850;780;820;810;850" dur="3s" repeatCount="indefinite"/>
    </rect>
    <rect x="15" y="120" width="770" height="2" fill="#00ffff" opacity="0.28">
      <animate attributeName="x" values="25;-15;35;-5;15" dur="2.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="-20" y="185" width="840" height="4" fill="url(#glitchRed)" opacity="0.22">
      <animate attributeName="x" values="-40;20;-10;30;-40" dur="4s" repeatCount="indefinite"/>
    </rect>
    <rect x="30" y="250" width="750" height="2" fill="#ff0040" opacity="0.18">
      <animate attributeName="x" values="45;10;55;20;30" dur="2.8s" repeatCount="indefinite"/>
    </rect>
    <rect x="-10" y="310" width="820" height="3" fill="url(#glitchCyan)" opacity="0.25">
      <animate attributeName="x" values="-25;15;-5;25;-10" dur="3.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="20" y="380" width="760" height="2" fill="#ff0040" opacity="0.2">
      <animate attributeName="x" values="35;-10;40;5;20" dur="2.2s" repeatCount="indefinite"/>
    </rect>
    <rect x="-30" y="440" width="860" height="4" fill="url(#glitchRed)" opacity="0.16">
      <animate attributeName="x" values="-50;25;-15;35;-30" dur="3.8s" repeatCount="indefinite"/>
    </rect>
    <rect x="10" y="500" width="780" height="2" fill="#00ffff" opacity="0.24">
      <animate attributeName="x" values="25;-5;30;0;10" dur="2.6s" repeatCount="indefinite"/>
    </rect>
    <rect x="-15" y="555" width="830" height="3" fill="#ff0040" opacity="0.19">
      <animate attributeName="x" values="-30;20;-10;25;-15" dur="3.2s" repeatCount="indefinite"/>
    </rect>
  </g>
  <g opacity="0.08">
    <rect x="200" y="90" width="60" height="18" fill="#ff0040" transform="skewX(-12)">
      <animate attributeName="opacity" values="0.08;0.15;0.06;0.12;0.08" dur="2s" repeatCount="indefinite"/>
    </rect>
    <rect x="520" y="280" width="80" height="14" fill="#00ffff" transform="skewX(8)">
      <animate attributeName="opacity" values="0.06;0.14;0.08;0.11;0.06" dur="2.4s" repeatCount="indefinite"/>
    </rect>
    <rect x="150" y="420" width="70" height="16" fill="#ff0040" transform="skewX(-6)">
      <animate attributeName="opacity" values="0.07;0.13;0.05;0.1;0.07" dur="1.8s" repeatCount="indefinite"/>
    </rect>
    <rect x="550" y="160" width="55" height="12" fill="#00ffff" transform="skewX(10)">
      <animate attributeName="opacity" values="0.09;0.16;0.07;0.13;0.09" dur="2.7s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>