<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="orbGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#7b68ee;stop-opacity:1"/>
      <stop offset="25%" style="stop-color:#6b5bdd;stop-opacity:0.8"/>
      <stop offset="50%" style="stop-color:#5a4fcc;stop-opacity:0.5"/>
      <stop offset="75%" style="stop-color:#4a3fbb;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#3a32aa;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="orbCore" cx="50%" cy="50%" r="40%">
      <stop offset="0%" style="stop-color:#c8b8ff;stop-opacity:1"/>
      <stop offset="30%" style="stop-color:#a890ff;stop-opacity:0.7"/>
      <stop offset="60%" style="stop-color:#8868ee;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#6848dd;stop-opacity:0"/>
    </radialGradient>
    <filter id="orbGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="25" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="15" result="blur2"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur3"/>
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur3"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10"/>
    </filter>
  </defs>
  <rect width="400" height="400" fill="#000" opacity="0"/>
  <g filter="url(#orbGlow)">
    <circle cx="200" cy="200" r="120" fill="url(#orbGrad)"/>
  </g>
  <circle cx="200" cy="200" r="70" fill="url(#orbCore)" opacity="0.9"/>
  <circle cx="200" cy="200" r="25" fill="#e8d8ff" opacity="0.85" filter="url(#softGlow)"/>
  <circle cx="200" cy="200" r="12" fill="#fff" opacity="0.95"/>
</svg>