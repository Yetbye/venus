  <line x1="200" y1="170" x2="200" y2="175" stroke="#5A8F7B" stroke-width="1.5" opacity="0.6"/>
  <line x1="175" y1="150" x2="180" y2="150" stroke="#5A8F7B" stroke-width="1.5" opacity="0.6"/>
  <line x1="220" y1="150" x2="225" y2="150" stroke="#5A8F7B" stroke-width="1.5" opacity="0.6"/>
  <line x1="182" y1="132" x2="186" y2="136" stroke="#5A8F7B" stroke-width="1.5" opacity="0.6"/>
