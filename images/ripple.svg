<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="rippleGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#A8D8EA;stop-opacity:0" />
      <stop offset="80%" style="stop-color:#A8D8EA;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#A8D8EA;stop-opacity:0.6" />
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="400" fill="#FAF9F6"/>
  
  <!-- Water base -->
  <circle cx="200" cy="200" r="180" fill="url(#rippleGrad)" opacity="0.3"/>
  
  <!-- Ripple circles - varying thickness -->
  <circle cx="200" cy="200" r="30" fill="none" stroke="#A8D8EA" stroke-width="3" opacity="0.9"/>
  <circle cx="200" cy="200" r="55" fill="none" stroke="#A8D8EA" stroke-width="2.5" opacity="0.8"/>
  <circle cx="200" cy="200" r="80" fill="none" stroke="#A8D8EA" stroke-width="2" opacity="0.7"/>
  <circle cx="200" cy="200" r="105" fill="none" stroke="#A8D8EA" stroke-width="1.8" opacity="0.6"/>
  <circle cx="200" cy="200" r="130" fill="none" stroke="#A8D8EA" stroke-width="1.5" opacity="0.5"/>
  <circle cx="200" cy="200" r="155" fill="none" stroke="#A8D8EA" stroke-width="1.2" opacity="0.4"/>
  <circle cx="200" cy="200" r="180" fill="none" stroke="#A8D8EA" stroke-width="1" opacity="0.3"/>
  
  <!-- Inner highlight ripples -->
  <circle cx="200" cy="200" r="20" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.6"/>
  <circle cx="200" cy="200" r="42" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.5"/>
  <circle cx="200" cy="200" r="67" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.4"/>
  
  <!-- Center point -->
  <circle cx="200" cy="200" r="5" fill="#A8D8EA" opacity="0.8"/>
  <circle cx="200" cy="200" r="2" fill="#FFFFFF" opacity="0.9"/>
  
  <!-- Decorative arc segments -->
  <path d="M200,50 A150,150 0 0,1 350,200" fill="none" stroke="#A8D8EA" stroke-width="1" opacity="0.3" stroke-dasharray="10,5"/>
  <path d="M200,350 A150,150 0 0,1 50,200" fill="none" stroke="#A8D8EA" stroke-width="1" opacity="0.3" stroke-dasharray="10,5"/>
</svg>