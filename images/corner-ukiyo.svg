<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- 浮世绘角落装饰 - 日式角落图案 -->
  <defs>
    <linearGradient id="ukiyoCornerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2E6B8A"/>
      <stop offset="100%" style="stop-color:#1B4B6F"/>
    </linearGradient>
  </defs>
  
  <!-- 角落框架 -->
  <path d="M0 0 L100 0 L100 20 Q80 20 80 40 Q80 60 60 60 Q40 60 40 80 Q40 100 20 100 L0 100 Z" 
        fill="url(#ukiyoCornerGrad)" opacity="0.15"/>
  
  <!-- 主装饰边框 -->
  <path d="M0 0 L90 0 Q90 15 75 15 Q60 15 60 30 Q60 45 45 45 Q30 45 30 60 Q30 75 15 75 Q15 90 0 90 Z" 
        fill="none" stroke="#1B4B6F" stroke-width="2"/>
  
  <!-- 内层边框 -->
  <path d="M0 0 L80 0 Q80 12 68 12 Q55 12 55 25 Q55 38 42 38 Q28 38 28 52 Q28 65 15 65 Q15 78 0 78 Z" 
        fill="none" stroke="#2E6B8A" stroke-width="1" opacity="0.6"/>
  
  <!-- 波浪装饰 -->
  <g stroke="#1B4B6F" stroke-width="1.5" fill="none">
    <path d="M10 85 Q20 80 25 90 Q30 100 40 95"/>
    <path d="M20 75 Q30 70 35 80 Q40 90 50 85"/>
    <path d="M30 65 Q40 60 45 70 Q50 80 60 75"/>
  </g>
  
  <!-- 樱花装饰 -->
  <g fill="#FFB7C5" opacity="0.7">
    <ellipse cx="75" cy="25" rx="4" ry="6" transform="rotate(30)"/>
    <ellipse cx="45" cy="55" rx="3" ry="5" transform="rotate(-20)"/>
    <ellipse cx="25" cy="85" rx="3.5" ry="5.5" transform="rotate(45)"/>
  </g>
  
  <!-- 青海波装饰 -->
  <g stroke="#1B4B6F" stroke-width="1" fill="none" opacity="0.4">
    <path d="M85 5 Q90 10 85 15 Q80 20 75 15"/>
    <path d="M55 35 Q60 40 55 45 Q50 50 45 45"/>
  </g>
  
  <!-- 角落点装饰 -->
  <g fill="#1B4B6F" opacity="0.5">
    <circle cx="5" cy="5" r="2"/>
    <circle cx="15" cy="15" r="1.5"/>
    <circle cx="85" cy="8" r="1.5"/>
    <circle cx="8" cy="85" r="1.5"/>
  </g>
  
  <!-- 细线装饰 -->
  <path d="M5 95 Q15 90 20 100" stroke="#2E6B8A" stroke-width="0.8" fill="none" opacity="0.5"/>
  <path d="M95 5 Q90 15 100 20" stroke="#2E6B8A" stroke-width="0.8" fill="none" opacity="0.5"/>
</svg>