<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Background -->
  <rect width="400" height="400" fill="#FAF9F6"/>
  
  <!-- Single line education/book illustration -->
  <g fill="none" stroke="#2C3E50" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- Open book - continuous line -->
    <path d="M100,120 
             L200,150 
             L300,120 
             L300,280 
             L200,310 
             L100,280 
             Z"/>
    
    <!-- Book spine/crease -->
    <line x1="200" y1="150" x2="200" y2="310"/>
    
    <!-- Left page lines -->
    <line x1="120" y1="160" x2="180" y2="175" stroke-width="2"/>
    <line x1="120" y1="180" x2="180" y2="195" stroke-width="2"/>
    <line x1="120" y1="200" x2="180" y2="215" stroke-width="2"/>
    <line x1="120" y1="220" x2="180" y2="235" stroke-width="2"/>
    <line x1="120" y1="240" x2="170" y2="252" stroke-width="2"/>
    
    <!-- Right page lines -->
    <line x1="220" y1="175" x2="280" y2="160" stroke-width="2"/>
    <line x1="220" y1="195" x2="280" y2="180" stroke-width="2"/>
    <line x1="220" y1="215" x2="280" y2="200" stroke-width="2"/>
    <line x1="220" y1="235" x2="280" y2="220" stroke-width="2"/>
    <line x1="220" y1="255" x2="270" y2="242" stroke-width="2"/>
    
    <!-- Graduation cap -->
    <path d="M150,80 L250,80 L290,100 L200,130 L110,100 Z"/>
    <line x1="200" y1="130" x2="200" y2="150"/>
    <line x1="200" y1="150" x2="240" y2="130"/>
    <circle cx="240" cy="130" r="5"/>
    
    <!-- Decorative stars/sparkles -->
    <path d="M320,200 L325,185 L330,200 L345,205 L330,210 L325,225 L320,210 L305,205 Z" stroke-width="2"/>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="60" cy="300" r="25" fill="none" stroke="#E85D4E" stroke-width="1" opacity="0.3"/>
  <circle cx="340" cy="320" r="20" fill="none" stroke="#1B4B6F" stroke-width="1" opacity="0.3"/>
  <line x1="80" y1="100" x2="120" y2="100" stroke="#F4D03F" stroke-width="2" opacity="0.4"/>
</svg>